<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Custom Order — LotaModel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <nav class="wrap">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 8H22V44H36V52H8V8Z" fill="url(#silverGradh)"/>
        <path d="M22 8H32L38 20L44 8H54V52H44V26L38 36L32 26V52H22V8Z" fill="url(#blueGradh)"/>
        <defs>
          <linearGradient id="silverGradh" x1="8" y1="8" x2="36" y2="52" gradientUnits="userSpaceOnUse">
            <stop stop-color="#EDEFF1"/><stop offset="1" stop-color="#8B939B"/>
          </linearGradient>
          <linearGradient id="blueGradh" x1="22" y1="8" x2="54" y2="52" gradientUnits="userSpaceOnUse">
            <stop stop-color="#57C2FF"/><stop offset="1" stop-color="#2B9BDB"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="wordmark">LOTA<span class="m">MODEL</span></div>
    </a>
    <div class="navlinks">
      <a href="index.html">Home</a>
      <a href="product.html">Product</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About</a>
      <a href="custom-order.html" class="active">Custom Order</a>
    </div>
  </nav>
</header>

<section class="cta-block" style="border-bottom:none;">
  <div class="wrap">
    <h2>Need a custom order? Just fill in the form below.</h2>
    <div class="form-panel">
      <form onsubmit="event.preventDefault(); this.querySelector('.cta-btn-wide').textContent='Sent — we will be in touch';">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" required />
        </div>
        <div class="field">
          <label for="type">What are you looking for?</label>
          <select id="type">
            <option>Custom light box</option>
            <option>NFC stand</option>
            <option>Keychain</option>
            <option>Something else</option>
          </select>
        </div>
        <div class="field">
          <label for="details">Tell us about your order</label>
          <textarea id="details" required></textarea>
        </div>
        <button type="submit" class="cta-btn-wide">Custom Order?</button>
      </form>
    </div>
  </div>
</section>
<footer>
  <div class="wrap">
    <div class="flogo">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 8H22V44H36V52H8V8Z" fill="url(#silverGradf)"/>
        <path d="M22 8H32L38 20L44 8H54V52H44V26L38 36L32 26V52H22V8Z" fill="url(#blueGradf)"/>
        <defs>
          <linearGradient id="silverGradf" x1="8" y1="8" x2="36" y2="52" gradientUnits="userSpaceOnUse">
            <stop stop-color="#EDEFF1"/><stop offset="1" stop-color="#8B939B"/>
          </linearGradient>
          <linearGradient id="blueGradf" x1="22" y1="8" x2="54" y2="52" gradientUnits="userSpaceOnUse">
            <stop stop-color="#57C2FF"/><stop offset="1" stop-color="#2B9BDB"/>
          </linearGradient>
        </defs>
      </svg>
      <span>LOTAMODEL</span>
    </div>
    <div class="ftag">Where Ideas Take Form.</div>
  </div>
</footer>
</body>
</html>
